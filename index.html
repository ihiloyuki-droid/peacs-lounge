<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Peacs Lounge 管理表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--r900:#5C1210;--r800:#8B2318;--r600:#B23A33;--r400:#CC5B55;--r200:#F0B8B5;--r100:#FAE8E7;--r50:#FDF5F5}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;color:#1a1a1a;font-size:14px;background:#f5f5f5;min-height:100vh}

/* ヘッダー */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--r800);position:sticky;top:0;z-index:20}
.hdr-l{display:flex;align-items:center;gap:8px}
.logo{width:28px;height:28px;background:var(--r50);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--r800);flex-shrink:0}
.hdr-title{font-size:13px;font-weight:600;color:#fff;letter-spacing:.03em}
.hdr-sub{font-size:9px;color:var(--r200);margin-top:1px}
.hdr-date{font-size:10px;color:var(--r200);background:var(--r900);padding:3px 8px;border-radius:20px;white-space:nowrap}

/* タブ */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--r100);position:sticky;top:49px;z-index:19;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;font-size:12px;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--r800);font-weight:600;border-bottom-color:var(--r600)}

/* コンテンツ */
.content{padding:12px 14px}
.view{display:none}.view.active{display:block}

/* ナビ */
.wnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.wlbl{font-size:13px;font-weight:600;white-space:nowrap}
.nbns{display:flex;gap:4px}
.nbn{padding:6px 10px;border:1px solid var(--r200);border-radius:6px;cursor:pointer;font-size:11px;background:#fff;color:var(--r800);transition:all .15s;-webkit-tap-highlight-color:transparent}
.nbn:active{background:var(--r50)}

/* レジェンド */
.lgrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.lgi{display:flex;align-items:center;gap:3px;font-size:10px;color:#666}
.lgd{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* ─── カレンダー ─── */
.calwrap{border:1px solid var(--r200);border-radius:9px;overflow:hidden;background:#fff}
.cal-table{width:100%;border-collapse:collapse;table-layout:fixed}
.cal-table col.c-time{width:36px}
.cal-hdr-time{background:var(--r50);border-right:1px solid var(--r200);border-bottom:1px solid var(--r200);font-size:8px;color:var(--r600);text-align:center;padding:3px 1px;vertical-align:middle}
.cal-th{border-right:1px solid var(--r200);border-bottom:1px solid var(--r200);padding:0;vertical-align:top}
.cal-th:last-child{border-right:none}
.day-hdr{padding:4px 2px;text-align:center}
.dhn{font-size:10px;font-weight:700}
.dhd{font-size:9px;margin-top:1px}
.dhd.tod{font-weight:700}
.staff-strip{padding:2px;display:flex;flex-wrap:wrap;gap:1px;border-top:1px solid var(--r100);background:#fff;min-height:18px}
.schip{display:flex;align-items:center;gap:1px;border-radius:6px;padding:1px 3px;font-size:7px;font-weight:600;white-space:nowrap}
.calvbody-wrap{overflow-y:auto;max-height:calc(100vh - 280px);-webkit-overflow-scrolling:touch}
.cal-time-lbl{background:#fff;font-size:8px;color:#aaa;border-right:1px solid var(--r100);border-bottom:1px solid var(--r100);text-align:center;padding:1px 0;vertical-align:top;height:24px}
.dcell{height:24px;border-right:1px solid var(--r100);border-bottom:1px solid var(--r100);cursor:pointer;position:relative;overflow:hidden;padding:0;-webkit-tap-highlight-color:transparent}
.dcell:last-child{border-right:none}
.dcell:active{background:var(--r50)}
.dcell.sat-col{background:#EBF3FC}
.dcell.sun-col{background:#FFF5F5}
.bbar{position:absolute;inset:1px;border-radius:2px;padding:1px 2px;font-size:7px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;pointer-events:none;color:#fff}
.staff-shade{position:absolute;inset:0;pointer-events:none}

/* ─── 予約一覧 ─── */
.lcard{border:1px solid var(--r200);border-radius:9px;overflow:hidden;margin-bottom:12px;background:#fff}
.lrow{display:flex;align-items:flex-start;padding:10px 12px;border-bottom:1px solid var(--r100);gap:8px;flex-wrap:wrap}
.lrow:last-child{border-bottom:none}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.rm{flex:1;min-width:0}
.rn{font-size:13px;font-weight:600}
.rs{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.row-badges{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:6px}
.row-actions{display:flex;gap:4px;align-items:center}
.bdg{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600}
.b-ok{background:#EAF3DE;color:#27500A}
.b-warn{background:#FAEEDA;color:#633806}
.b-ind{background:#EAF3DE;color:#27500A}
.b-grp{background:#E6F1FB;color:#0C447C}
.b-evt{background:#FAEEDA;color:#633806}
.b-oth{background:#F1EFE8;color:#444441}
.icon-btn{cursor:pointer;padding:6px 10px;border-radius:6px;font-size:13px;color:#aaa;border:1px solid var(--r100);background:#fff;-webkit-tap-highlight-color:transparent}
.icon-btn:active{background:var(--r50)}

/* ─── シフト管理（モバイル最適化） ─── */
.shift-staff-card{background:#fff;border:1px solid var(--r200);border-radius:10px;margin-bottom:12px;overflow:hidden}
.shift-staff-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--r50);border-bottom:1px solid var(--r100)}
.shift-staff-name{font-size:13px;font-weight:600;flex:1}
.shift-staff-role{font-size:10px;color:#aaa}
.shift-days-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.shift-day-cell{padding:10px 12px;border-right:1px solid var(--r100);border-bottom:1px solid var(--r100)}
.shift-day-cell:nth-child(2n){border-right:none}
.shift-day-cell:nth-last-child(-n+2){border-bottom:none}
.shift-day-cell.sat-bg{background:#f0f6fc}
.shift-day-cell.sun-bg{background:#fff8f8}
.shift-day-label{font-size:11px;font-weight:700;margin-bottom:6px}
.shift-day-date{font-size:10px;color:#aaa;font-weight:400;margin-left:4px}
.shift-time-row{display:flex;align-items:center;gap:4px;margin-bottom:6px}
.time-sel{flex:1;min-width:0;padding:7px 4px;border:1px solid var(--r200);border-radius:6px;font-size:12px;color:#1a1a1a;background:#fff;text-align:center;-webkit-appearance:none;appearance:none;cursor:pointer}
.time-sel:disabled{background:#f5f5f5;color:#ccc}
.time-sel:focus{outline:none;border-color:var(--r400)}
.time-sep{font-size:11px;color:#aaa;flex-shrink:0}
.toggle-btn{width:100%;padding:7px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .15s;-webkit-tap-highlight-color:transparent}
.toggle-btn.is-off{background:#f0f0f0;color:#888}
.toggle-btn.is-on{background:var(--r100);color:var(--r800)}
.toggle-btn:active{opacity:.8}
.shift-del-btn{background:none;border:none;color:#ddd;font-size:14px;cursor:pointer;padding:0 4px}
.move-btn{background:none;border:1px solid var(--r100);border-radius:3px;color:var(--r400);font-size:9px;cursor:pointer;padding:1px 3px;line-height:1;-webkit-tap-highlight-color:transparent}
.move-btn:active{background:var(--r50)}
.move-btn:disabled{cursor:default}

/* ─── ダッシュボード ─── */
.srow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sc{background:#fff;border-radius:8px;padding:12px 14px;border:1px solid var(--r100)}
.scl{font-size:10px;color:var(--r600);margin-bottom:4px;line-height:1.3}
.scv{font-size:22px;font-weight:700;color:var(--r800)}
.twoc{display:flex;flex-direction:column;gap:12px}
.stitle{font-size:12px;font-weight:600;margin-bottom:9px;color:#444}
.dash-row{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--r100);gap:8px}
.dash-row:last-child{border-bottom:none}

/* ─── ボタン類 ─── */
.addbtn{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border:1px solid var(--r200);border-radius:8px;cursor:pointer;font-size:12px;background:#fff;color:var(--r800);-webkit-tap-highlight-color:transparent}
.addbtn:active{background:var(--r50)}
.add-bk-fab{position:fixed;bottom:20px;right:16px;width:52px;height:52px;background:var(--r600);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;box-shadow:0 4px 14px rgba(178,58,51,.4);z-index:10;-webkit-tap-highlight-color:transparent;border:none}
.add-bk-fab:active{background:var(--r800)}

/* ─── モーダル ─── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 18px 32px;width:100%;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-width:600px){
  .modal-overlay{align-items:center}
  .modal{border-radius:14px;width:400px;max-height:85vh;margin:0 auto}
}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.mtitle{font-size:14px;font-weight:700;margin-bottom:16px;color:var(--r800)}
.flbl{font-size:11px;color:#888;margin-bottom:4px;display:block}
.fg{margin-bottom:12px}
.fi{width:100%;padding:10px 12px;border:1px solid var(--r200);border-radius:8px;font-size:14px;color:#1a1a1a;background:#fff;-webkit-appearance:none;appearance:none}
.fi:focus{outline:none;border-color:var(--r400)}
.mact{display:flex;gap:8px;margin-top:16px}
.btp{flex:1;padding:12px;background:var(--r600);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600}
.btp:active{background:var(--r800)}
.bts{padding:12px 16px;background:transparent;color:#888;border:1px solid var(--r200);border-radius:8px;font-size:14px;cursor:pointer}
.radio-row{display:flex;gap:8px}
.radio-opt{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:13px;padding:10px;border:1px solid var(--r200);border-radius:8px}
.radio-opt input{accent-color:var(--r600)}

/* ステータス */
.status-bar{font-size:10px;text-align:right;padding:3px 0;min-height:16px;color:#aaa}
.dash-section-title{font-size:12px;font-weight:700;color:var(--r800);margin:16px 0 8px;padding-left:2px;letter-spacing:.03em}
.chart-card{background:#fff;border:1px solid var(--r100);border-radius:10px;padding:16px 14px;margin-bottom:14px;overflow-x:auto}
.chart-inner{min-width:320px}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:120px;margin-bottom:6px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.chart-bar{width:100%;border-radius:4px 4px 0 0;background:var(--r400);transition:height .3s;min-height:2px;position:relative;cursor:default}
.chart-bar.current-month{background:var(--r800)}
.chart-bar-val{font-size:9px;font-weight:700;color:var(--r800);text-align:center;min-height:12px}
.chart-labels{display:flex;gap:4px}
.chart-label{flex:1;text-align:center;font-size:9px;color:#aaa}
.chart-label.current-month{color:var(--r800);font-weight:700}
.status-bar.saving{color:#BA7517}
.status-bar.saved{color:#3B6D11}
.status-bar.err{color:var(--r600)}

/* PC向け調整 */
@media(min-width:768px){
  .content{padding:14px 20px;max-width:1100px;margin:0 auto}
  .srow{grid-template-columns:repeat(5,1fr)}
  .twoc{flex-direction:row}
  .twoc > div{flex:1}
  .shift-days-grid{grid-template-columns:repeat(7,1fr)}
  .shift-day-cell:nth-child(2n){border-right:1px solid var(--r100)}
  .shift-day-cell:nth-child(7n){border-right:none}
  .shift-day-cell:nth-last-child(-n+2){border-bottom:1px solid var(--r100)}
  .shift-day-cell:nth-last-child(-n+7):nth-child(7n+1),.shift-day-cell:nth-last-child(-n+7):nth-child(7n+2),.shift-day-cell:nth-last-child(-n+7):nth-child(7n+3),.shift-day-cell:nth-last-child(-n+7):nth-child(7n+4),.shift-day-cell:nth-last-child(-n+7):nth-child(7n+5),.shift-day-cell:nth-last-child(-n+7):nth-child(7n+6),.shift-day-cell:nth-last-child(1){border-bottom:none}
  .add-bk-fab{display:none}
  .lrow{flex-wrap:nowrap;align-items:center}
  .row-badges{margin-top:0}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="logo">PL</div>
    <div>
      <div class="hdr-title">Peacs Lounge 管理表</div>
      <div class="hdr-sub">予約・シフト管理システム</div>
    </div>
  </div>
  <div class="hdr-date" id="hdr-date"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="sw('calendar')">カレンダー</div>
  <div class="tab" onclick="sw('bookings')">予約一覧</div>
  <div class="tab" onclick="sw('shifts')">シフト管理</div>
  <div class="tab" onclick="sw('dashboard')">ダッシュボード</div>
</div>

<div class="content">
  <div class="status-bar" id="status-bar">Firebase に接続中...</div>

  <!-- カレンダー -->
  <div class="view active" id="view-calendar">
    <div class="wnav">
      <div class="wlbl" id="cal-wlbl"></div>
      <div class="nbns">
        <div class="nbn" onclick="wk(-1,'cal')">← 前週</div>
        <div class="nbn" onclick="wk(0,'cal')">今週</div>
        <div class="nbn" onclick="wk(1,'cal')">次週 →</div>
      </div>
    </div>
    <div class="lgrow">
      <div class="lgi"><div class="lgd" style="background:#63A826"></div>個人</div>
      <div class="lgi"><div class="lgd" style="background:#2E86DE"></div>団体</div>
      <div class="lgi"><div class="lgd" style="background:#F0A500"></div>イベント</div>
      <div class="lgi"><div class="lgd" style="background:#888780"></div>その他</div>
      <div class="lgi"><div class="lgd" style="background:#B5D4F4"></div>土</div>
      <div class="lgi"><div class="lgd" style="background:#FAE8E7"></div>日</div>
    </div>
    <div class="calwrap" id="cal-outer"></div>
  </div>

  <!-- 予約一覧 -->
  <div class="view" id="view-bookings">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="stitle" style="margin:0">予約一覧</div>
      <div class="addbtn" onclick="openBkModal(null)">+ 新規予約</div>
    </div>
    <div class="lcard" id="bk-list"></div>
    <button class="add-bk-fab" onclick="openBkModal(null)">+</button>
  </div>

  <!-- シフト管理 -->
  <div class="view" id="view-shifts">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div class="stitle" style="margin:0">スタッフシフト</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <div class="addbtn" onclick="openStaffModal()">+ スタッフ追加</div>
        <div class="nbns">
          <div class="nbn" onclick="wk(-1,'shift')">← 前週</div>
          <div class="nbn" onclick="wk(0,'shift')">今週</div>
          <div class="nbn" onclick="wk(1,'shift')">次週 →</div>
        </div>
      </div>
    </div>
    <div style="font-size:12px;color:#888;margin-bottom:10px" id="shift-wlbl"></div>
    <div id="shift-grid"></div>
  </div>

  <!-- ダッシュボード -->
  <div class="view" id="view-dashboard">

    <!-- 当月サマリ -->
    <div class="dash-section-title" id="dash-month-label">当月</div>
    <div class="srow">
      <div class="sc"><div class="scl">予約数</div><div class="scv" id="d1">—</div></div>
      <div class="sc"><div class="scl">利用者数（ユニーク）</div><div class="scv" id="d2">—</div></div>
      <div class="sc"><div class="scl">延べ利用人数</div><div class="scv" id="d5">—</div></div>
      <div class="sc"><div class="scl">稼働率</div><div class="scv" id="d3">—</div></div>
    </div>

    <!-- 年間サマリ -->
    <div class="dash-section-title" id="dash-year-label">年間</div>
    <div class="srow">
      <div class="sc"><div class="scl">予約数</div><div class="scv" id="y1">—</div></div>
      <div class="sc"><div class="scl">利用者数（ユニーク）</div><div class="scv" id="y2">—</div></div>
      <div class="sc"><div class="scl">延べ利用人数</div><div class="scv" id="y3">—</div></div>
      <div class="sc"><div class="scl">稼働率</div><div class="scv" id="y4">—</div></div>
    </div>

    <!-- 月別グラフ -->
    <div class="dash-section-title" id="dash-chart-label">月別 延べ利用人数</div>
    <div class="chart-card" id="month-chart"></div>

    <!-- スタッフ数 -->
    <div style="margin-bottom:14px">
      <div class="sc" style="display:inline-block;min-width:100px"><div class="scl">スタッフ数</div><div class="scv" id="d4">—</div></div>
    </div>

    <div class="twoc">
      <div><div class="stitle">直近の予約</div><div class="lcard" id="dash-bk"></div></div>
      <div><div class="stitle">今日の勤務スタッフ</div><div class="lcard" id="dash-staff"></div></div>
    </div>
  </div>
</div>

<!-- 予約モーダル -->
<div class="modal-overlay" id="modal-bk" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="mtitle" id="bk-mtitle">予約を追加</div>
    <div class="fg"><label class="flbl">種別</label>
      <select class="fi" id="i-type" onchange="onTypeChange()">
        <option value="user">一般予約</option><option value="event">イベント</option><option value="other">その他</option>
      </select>
    </div>
    <div id="user-detail-section">
      <div class="fg"><label class="flbl">利用区分</label>
        <div class="radio-row">
          <label class="radio-opt"><input type="radio" name="grp" value="individual" checked onchange="onGrpChange()"> 個人</label>
          <label class="radio-opt"><input type="radio" name="grp" value="group" onchange="onGrpChange()"> 団体</label>
        </div>
      </div>
      <div class="fg" id="pax-section" style="display:none">
        <label class="flbl">人数</label>
        <input class="fi" id="i-pax" type="number" min="2" max="500" placeholder="例：15">
      </div>
    </div>
    <div class="fg"><label class="flbl">利用者名 / イベント名</label><input class="fi" id="i-name" type="text" placeholder="山田 太郎"></div>
    <div class="fg"><label class="flbl">スペース</label>
      <select class="fi" id="i-space">
        <option value="メインスペース">メインスペース</option>
        <option value="個室">個室</option>
        <option value="リラックススペース">リラックススペース</option>
      </select>
    </div>
    <div class="fg"><label class="flbl">日付</label><input class="fi" id="i-date" type="date"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="fg"><label class="flbl">開始</label><select class="fi" id="i-start"></select></div>
      <div class="fg"><label class="flbl">終了</label><select class="fi" id="i-end"></select></div>
    </div>
    <div class="fg"><label class="flbl">ステータス</label>
      <select class="fi" id="i-status">
        <option value="仮予約">仮予約</option><option value="確認済み">確認済み</option>
      </select>
    </div>
    <div class="mact">
      <div class="bts" onclick="document.getElementById('modal-bk').classList.remove('open')">キャンセル</div>
      <button class="btp" onclick="saveBk()">保存する</button>
    </div>
  </div>
</div>

<!-- スタッフモーダル（追加・編集共用） -->
<div class="modal-overlay" id="modal-staff" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="mtitle" id="staff-modal-title">スタッフを追加</div>

const app = initializeApp(firebaseConfig);

const PALETTES = [

const DN_ALL = [

const SLOTS=[];
for(let h=8;h<24;h++){SLOTS.push(h+':00');SLOTS.push(h+':30')}
const TIME_OPTS=[];
for(let h=8;h<=24;h++){TIME_OPTS.push(h+':00');if(h<24)TIME_OPTS.push(h+':30')}
const BK={

};

let staff={}, bookings={}, shiftMap={};
let calWeekOff=0, shiftWeekOff=0;
let editingBkId=null;

function setStatus(msg,cls=''){const el=document.getElementById('status-bar');el.textContent=msg;el.className='status-bar '+cls;}
function monday(off){const n=new Date();const day=n.getDay();const base=n.getDate()-day+(day===0?-6:1);const m=new Date(n);m.setDate(base+off*7);m.setHours(0,0,0,0);return m;}
function dateStr(off,di){const m=monday(off);const d=new Date(m);d.setDate(d.getDate()+di);const y=d.getFullYear();const mo=String(d.getMonth()+1).padStart(2,'0');const dd=String(d.getDate()).padStart(2,'0');return y+'-'+mo+'-'+dd;}
function fmt(d){return (d.getMonth()+1)+'/'+d.getDate();}
function minToStr(m){const h=Math.floor(m/60),mi=m%60;return h+':'+(mi===0?'00':'30');}
function strToMin(s){const[h,mi]=s.split(':').map(Number);return h*60+mi;}
function isToday(d){const t=new Date();return d.toDateString()===t.toDateString();}
function slotMin(s){const[h,mi]=s.split(':').map(Number);return h*60+mi;}
function getPal(s){return PALETTES[(s.pal||0)%PALETTES.length];}
function bkc(b){return b.type==='event'?BK.evt:b.type==='other'?BK.oth:b.grp==='group'?BK.grp:BK.ind;}
function getShift(sid,di,off){const wo=off!==undefined?off:shiftWeekOff;return((shiftMap[sid]||{})[wo+'_'+di])||null;}
function staffAtSlot(di,slot,off){const sm=slotMin(slot);return Object.values(staff).filter(s=>{const r=getShift(s.id,di,off);return r&&sm>=r[0]&&sm<r[1]});}

onValue(ref(db,'staff'),snap=>{staff={};snap.forEach(c=>{staff[c.key]={id:c.key,...c.val()};});renderAll();setStatus('同期済み — '+new Date().toLocaleTimeString('ja-JP'),'saved');});
onValue(ref(db,'bookings'),snap=>{bookings={};snap.forEach(c=>{bookings[c.key]={id:c.key,...c.val()};});renderAll();});
onValue(ref(db,'shifts'),snap=>{shiftMap={};snap.forEach(sid=>{shiftMap[sid.key]={};sid.forEach(e=>{shiftMap[sid.key][e.key]=e.val();});});renderAll();});

function renderAll(){renderCalendar();renderBookings();renderShifts();renderDashboard();}

window.sw=function(tab){

  else shiftWeekOff=d===0?0:shiftWeekOff+d;

};

// ── カレンダー ──
function renderCalendar(){
  const m=monday(calWeekOff);
  document.getElementById('cal-wlbl').textContent=m.getFullYear()+'年'+(m.getMonth()+1)+'月';
  const outer=document.getElementById('cal-outer');
  let html=`<table class="cal-table"><colgroup><col class="c-time">${DN_ALL.map(()=>'<col>').join('')}</colgroup><thead><tr>`;
  html+=`<th class="cal-hdr-time">時刻</th>`;
  DN_ALL.forEach(dd=>{
    const d=new Date(m);d.setDate(d.getDate()+dd.di);
    const tod=isToday(d);
    const nc=dd.sat?'#185FA5':dd.sun?'#B23A33':'#8B2318';
    const dc=dd.sat?'#378ADD':dd.sun?'#CC5B55':'#B23A33';
    const bg=dd.sat?'background:#EBF3FC':dd.sun?'background:#FFF5F5':'background:#FDF5F5';
    const onDuty=Object.values(staff).map(s=>{const r=getShift(s.id,dd.di,calWeekOff);if(!r)return null;const p=getPal(s);return `<div class="schip" style="background:${p.shade};border:1px solid ${p.bg}"><div style="width:9px;height:9px;border-radius:50%;background:${p.bg};flex-shrink:0"></div><span style="color:${p.tc}">${s.name.split(' ')[0]} ${minToStr(r[0])}〜${r[1]===24*60?'24:00':minToStr(r[1])}</span></div>`;}).filter(Boolean).join('');
    html+=`<th class="cal-th" style="${bg}"><div class="day-hdr"><div class="dhn" style="color:${nc}">${dd.label}</div><div class="dhd${tod?' tod':''}" style="color:${dc}">${fmt(d)}${tod?' 今':''}</div></div><div class="staff-strip">${onDuty||'<span style="font-size:7px;color:#ccc">未設定</span>'}</div></th>`;
  });
  html+=`</tr></thead></table><div class="calvbody-wrap"><table class="cal-table"><colgroup><col class="c-time">${DN_ALL.map(()=>'<col>').join('')}</colgroup><tbody id="cal-tbody"></tbody></table></div>`;
  outer.innerHTML=html;
  const tbody=document.getElementById('cal-tbody');
  SLOTS.forEach(slot=>{
    const tr=document.createElement('tr');
    const td0=document.createElement('td');td0.className='cal-time-lbl';td0.textContent=slot.endsWith(':00')?slot:'';tr.appendChild(td0);
    DN_ALL.forEach(dd=>{
      const ds=dateStr(calWeekOff,dd.di);
      const td=document.createElement('td');td.className='dcell';
      if(dd.sat)td.classList.add('sat-col');if(dd.sun)td.classList.add('sun-col');
      // 開始セル：バー＋名前ラベル
      const bk=Object.values(bookings).find(b=>b.date===ds&&b.start===slot);
      // 継続中セル：開始より後で終了より前のスロット
      const bkCont=!bk?Object.values(bookings).find(b=>{
        if(b.date!==ds)return false;
        const sm=slotMin(slot),bStart=slotMin(b.start),bEnd=slotMin(b.end);
        return sm>bStart&&sm<bEnd;
      }):null;
      if(bk){
        const c=bkc(bk);td.style.background=c.cell;
        const bar=document.createElement('div');bar.className='bbar';bar.style.background=c.bar;
        // 終了時刻のスロット数を計算してborderRadiusを制御
        bar.style.borderRadius='3px 3px 0 0';
        bar.textContent=(bk.type==='event'?'[E] ':bk.grp==='group'?'[団'+bk.pax+'名] ':'')+bk.name;
        td.appendChild(bar);td.onclick=()=>openBkModal(bk.id);
      } else if(bkCont){
        const c=bkc(bkCont);td.style.background=c.cell;
        const bEnd=slotMin(bkCont.end);const nextSlotIdx=SLOTS.indexOf(slot)+1;
        const isLast=nextSlotIdx>=SLOTS.length||slotMin(SLOTS[nextSlotIdx])>=bEnd;
        const bar=document.createElement('div');bar.className='bbar';bar.style.background=c.bar;
        bar.style.borderRadius=isLast?'0 0 3px 3px':'0';
        bar.style.top='0';bar.style.bottom='0';
        td.appendChild(bar);td.onclick=()=>openBkModal(bkCont.id);
      } else {
        const onNow=staffAtSlot(dd.di,slot,calWeekOff);
        if(onNow.length){const cw=100/onNow.length;onNow.forEach((s,i)=>{const p=getPal(s);const sh=document.createElement('div');sh.className='staff-shade';sh.style.cssText=`left:${i*cw}%;width:${cw}%;background:${p.shade};border-left:1.5px solid ${p.bg}`;td.appendChild(sh);});}
        td.onclick=()=>openBkModalWith(ds,slot);
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

// ── シフト管理 ──
function sortedStaff(){
  return Object.values(staff).sort((a,b)=>(a.order??9999)-(b.order??9999));
}
function moveStaff(id,dir){
  // orderを0,1,2...と整理してからswap
  const list=sortedStaff();
  // まず全員にorderを振り直す
  list.forEach((s,i)=>{s._tempOrder=i;});
  const idx=list.findIndex(s=>s.id===id);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=list.length)return;
  // swap
  list[idx]._tempOrder=newIdx;
  list[newIdx]._tempOrder=idx;
  const updates={};
  list.forEach(s=>{updates['staff/'+s.id+'/order']=s._tempOrder;});
  update(ref(db),updates)
    .then(()=>{ setStatus('並び順を保存しました','saved'); })
    .catch(e=>{ console.error(e); setStatus('保存エラー','err'); });
}

function renderShifts(){
  const m=monday(shiftWeekOff);
  document.getElementById('shift-wlbl').textContent=m.getFullYear()+'年'+(m.getMonth()+1)+'月';
  const staffList=Object.values(staff).sort((a,b)=>(a.order??99)-(b.order??99));
  const grid=document.getElementById('shift-grid');
  if(!staffList.length){grid.innerHTML='<div style="padding:24px;text-align:center;font-size:13px;color:#aaa;background:#fff;border-radius:10px;border:1px solid var(--r200)">スタッフを追加してください</div>';return;}

  grid.innerHTML='';
  staffList.forEach((s,idx)=>{
    const p=getPal(s);
    const daysHtml=DN_ALL.map(dd=>{
      const d=new Date(m);d.setDate(d.getDate()+dd.di);
      const r=getShift(s.id,dd.di);
      const isOff=!r;
      const startVal=r?minToStr(r[0]):'9:00';
      const endVal=r?(r[1]===24*60?'24:00':minToStr(r[1])):'18:00';
      const nc=dd.sat?'color:#185FA5':dd.sun?'color:#B23A33':'color:#1a1a1a';
      const cellCls=dd.sat?'shift-day-cell sat-bg':dd.sun?'shift-day-cell sun-bg':'shift-day-cell';
      return `<div class="${cellCls}">
        <div class="shift-day-label" style="${nc}">${dd.label}<span class="shift-day-date">${fmt(d)}</span></div>
        <div class="shift-time-row">
          <select class="time-sel" id="sel-s-${s.id}-${dd.di}" ${isOff?'disabled':''} onchange="onShiftChange('${s.id}',${dd.di})">
            ${TIME_OPTS.filter(t=>t!=='24:00').map(t=>`<option value="${t}"${t===startVal?' selected':''}>${t}</option>`).join('')}
          </select>
          <span class="time-sep">〜</span>
          <select class="time-sel" id="sel-e-${s.id}-${dd.di}" ${isOff?'disabled':''} onchange="onShiftChange('${s.id}',${dd.di})">
            ${TIME_OPTS.filter(t=>t!=='8:00'&&t!=='8:30').map(t=>`<option value="${t}"${t===endVal?' selected':''}>${t}</option>`).join('')}
          </select>
        </div>
        <button class="toggle-btn ${isOff?'is-off':'is-on'}" onclick="toggleOff('${s.id}',${dd.di})">${isOff?'休み':'出勤中'}</button>
      </div>`;
    }).join('');
    const isFirst=idx===0;
    const isLast=idx===staffList.length-1;
    const sid=s.id;
    const upDisabled=isFirst?'disabled':'';
    const downDisabled=isLast?'disabled':'';
    const upOp=isFirst?'0.2':'1';
    const downOp=isLast?'0.2':'1';
    const cardEl=document.createElement('div');
    cardEl.className='shift-staff-card';
    cardEl.id='scard-'+sid;
    cardEl.innerHTML=`
      <div class="shift-staff-hdr">
        <div style="display:flex;flex-direction:column;gap:1px;margin-right:4px">
          <button class="move-btn" style="opacity:${upOp}" ${upDisabled}>▲</button>
          <button class="move-btn" style="opacity:${downOp}" ${downDisabled}>▼</button>
        </div>
        <div style="width:26px;height:26px;border-radius:50%;background:${p.bg};color:${p.tc};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${s.init}</div>
        <div style="flex:1"><div class="shift-staff-name">${s.name}</div><div class="shift-staff-role">${s.role}</div></div>
        <button class="shift-del-btn" style="color:#aaa;font-size:12px;margin-right:6px">✏</button>
        <button class="shift-del-btn">×</button>
      </div>
      <div class="shift-days-grid">${daysHtml}</div>`;
    const btns=cardEl.querySelectorAll('.move-btn');
    if(!isFirst) btns[0].addEventListener('click',()=>moveStaff(sid,-1));
    if(!isLast)  btns[1].addEventListener('click',()=>moveStaff(sid,1));
    const editBtn=cardEl.querySelector('.shift-del-btn');
    editBtn.addEventListener('click',()=>openEditStaffModal(sid));
    const delBtn=cardEl.querySelectorAll('.shift-del-btn')[1];
    delBtn.addEventListener('click',()=>removeStaff(sid));
    return cardEl;
    grid.appendChild(cardEl);
  });
}

window.onShiftChange=function(sid,di){
  const startEl=document.getElementById('sel-s-'+sid+'-'+di);
  const endEl=document.getElementById('sel-e-'+sid+'-'+di);
  if(!startEl||!endEl)return;
  const s=strToMin(startEl.value);let e=strToMin(endEl.value);
  if(e<=s){e=Math.min(s+60,24*60);endEl.value=e===24*60?'24:00':minToStr(e);}
  const range=[s,e];
  if(!shiftMap[sid])shiftMap[sid]={};
  shiftMap[sid][shiftWeekOff+'_'+di]=range;
  set(ref(db,`shifts/${sid}/${shiftWeekOff}_${di}`),range);
  setStatus('保存しました','saved');
  renderCalendar();renderDashboard();
};

window.toggleOff=function(sid,di){
  const r=getShift(sid,di);
  if(r){remove(ref(db,`shifts/${sid}/${shiftWeekOff}_${di}`));if(shiftMap[sid])delete shiftMap[sid][shiftWeekOff+'_'+di];}
  else{const range=[9*60,18*60];if(!shiftMap[sid])shiftMap[sid]={};shiftMap[sid][shiftWeekOff+'_'+di]=range;set(ref(db,`shifts/${sid}/${shiftWeekOff}_${di}`),range);}
  setStatus('保存しました','saved');renderShifts();renderCalendar();renderDashboard();
};

window.removeStaff=function(id){if(!confirm('このスタッフを削除しますか？'))return;remove(ref(db,'staff/'+id));remove(ref(db,'shifts/'+id));};

// ── ダッシュボード ──
function calcStats(bkList){
  // 予約数・ユニーク利用者・延べ人数はすべて一般予約(user)のみ対象
  const userList=bkList.filter(b=>b.type==='user');
  const count=userList.length;
  const uniq=[...new Set(userList.map(b=>b.name))].length;
  const total=userList.reduce((sum,b)=>{
    return sum+(b.grp==='group'?(parseInt(b.pax)||0):1);
  },0);
  const rate=Math.round(count/20*100)+'%';
  return{count,uniq,total,rate};
}
function fiscalYear(now){
  // 4月始まり年度
  const m=now.getMonth()+1;
  const y=now.getFullYear();
  return m>=4?y:y-1;
}
function fiscalMonths(fy){
  // 4月〜翌3月の12ヶ月を返す [{year,month,label}]
  const months=[];
  for(let i=0;i<12;i++){
    const m=((3+i)%12)+1;
    const y=m>=4?fy:fy+1;
    months.push({year:y,month:m,label:m+'月',key:y+'-'+String(m).padStart(2,'0')});
  }
  return months;
}
function renderDashboard(){
  const now=new Date();
  const curMonth=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const curMonthLabel=(now.getMonth()+1)+'月';
  const fy=fiscalYear(now);
  const fyLabel=fy+'年4月〜'+(fy+1)+'年3月';
  const bkList=Object.values(bookings);

  // 当月ラベル
  document.getElementById('dash-month-label').textContent='当月（'+curMonthLabel+'）';
  document.getElementById('dash-year-label').textContent='年間（'+fyLabel+'）';
  document.getElementById('dash-chart-label').textContent='月別 延べ利用人数（'+fyLabel+'）';

  // 当月集計
  const moList=bkList.filter(b=>b.date.startsWith(curMonth));
  const moS=calcStats(moList);
  document.getElementById('d1').textContent=moS.count;
  document.getElementById('d2').textContent=moS.uniq;
  document.getElementById('d5').textContent=moS.total;
  document.getElementById('d3').textContent=moS.rate;

  // 年間集計（4月〜3月）
  const months=fiscalMonths(fy);
  const fyKeys=months.map(m=>m.key);
  const yrList=bkList.filter(b=>fyKeys.some(k=>b.date.startsWith(k)));
  const yrS=calcStats(yrList);
  document.getElementById('y1').textContent=yrS.count;
  document.getElementById('y2').textContent=yrS.uniq;
  document.getElementById('y3').textContent=yrS.total;
  document.getElementById('y4').textContent=yrS.rate;

  // スタッフ数
  document.getElementById('d4').textContent=Object.values(staff).length;

  // 月別グラフ
  const monthTotals=months.map(m=>{
    const ml=bkList.filter(b=>b.date.startsWith(m.key));
    return calcStats(ml).total;
  });
  const maxVal=Math.max(...monthTotals,1);
  const chartHtml=`<div class="chart-inner">
    <div class="chart-bars">${months.map((m,i)=>{
      const val=monthTotals[i];
      const pct=Math.round(val/maxVal*100);
      const isCur=m.key===curMonth;
      return `<div class="chart-bar-wrap"><div class="chart-bar-val">${val>0?val:''}</div><div class="chart-bar${isCur?' current-month':''}" style="height:${Math.max(pct,2)}%"></div></div>`;
    }).join('')}</div>
    <div class="chart-labels">${months.map(m=>`<div class="chart-label${m.key===curMonth?' current-month':''}">${m.label}</div>`).join('')}</div>
  </div>`;
  document.getElementById('month-chart').innerHTML=chartHtml;

  // 直近の予約
  const recent=[...bkList].sort((a,b)=>(b.date+b.start).localeCompare(a.date+a.start)).slice(0,5);
  document.getElementById('dash-bk').innerHTML=recent.length
    ?recent.map(b=>{const c=bkc(b);const isEvt=b.type==='event',isGrp=b.grp==='group';return `<div class="dash-row"><div class="rm"><div class="rn" style="font-size:12px">${b.name}${isGrp?' ('+b.pax+'名)':''}</div><div class="rs">${b.space} ・ ${b.date}</div></div><div class="bdg" style="background:${c.avBg};color:${c.avTc}">${isEvt?'イベント':isGrp?'団体':'個人'}</div></div>`;}).join('')
    :'<div style="padding:14px;text-align:center;color:#aaa;font-size:12px">予約なし</div>';

  // 今日の勤務スタッフ
  const todayDow=now.getDay();const di=todayDow>=1&&todayDow<=5?todayDow-1:0;
  const staffList=Object.values(staff);
  document.getElementById('dash-staff').innerHTML=staffList.length
    ?staffList.map(s=>{const r=getShift(s.id,di,0);const p=getPal(s);const label=r?minToStr(r[0])+'〜'+(r[1]===24*60?'24:00':minToStr(r[1])):'休み';return `<div class="dash-row"><div class="av" style="background:${p.bg};color:${p.tc};width:26px;height:26px;font-size:11px">${s.init}</div><div class="rm"><div class="rn" style="font-size:12px">${s.name}</div><div class="rs">${s.role}</div></div><div class="bdg" style="background:${r?p.shade:'#f0f0f0'};color:${r?p.tc:'#aaa'};border:1px solid ${r?p.bg:'#ddd'}">${label}</div></div>`;}).join('')
    :'<div style="padding:14px;text-align:center;color:#aaa;font-size:12px">スタッフなし</div>';
}

// ── スタッフ ──
let editingStaffId=null;

function buildColorSelect(selectedPal){
  const sel=document.getElementById('s-color');
  sel.innerHTML=PALETTES.map((p,i)=>`<option value="${i}"${i===selectedPal?' selected':''}>${p.name}</option>`).join('');
}

window.openStaffModal=function(){
  editingStaffId=null;
  document.getElementById('staff-modal-title').textContent='スタッフを追加';
  document.getElementById('staff-modal-btn').textContent='追加する';
  document.getElementById('s-name-group').style.display='block';
  document.getElementById('s-name').value='';
  document.getElementById('s-role').value='スタッフ';
  buildColorSelect(0);
  document.getElementById('modal-staff').classList.add('open');
};

window.openEditStaffModal=function(id){
  const s=staff[id];if(!s)return;
  editingStaffId=id;
  document.getElementById('staff-modal-title').textContent='スタッフを編集';
  document.getElementById('staff-modal-btn').textContent='更新する';
  document.getElementById('s-name-group').style.display='none';
  document.getElementById('s-role').value=s.role||'スタッフ';
  buildColorSelect(s.pal||0);
  document.getElementById('modal-staff').classList.add('open');
};

window.saveStaff=function(){
  if(editingStaffId){
    const updates={role:document.getElementById('s-role').value,pal:parseInt(document.getElementById('s-color').value)};
    const s=staff[editingStaffId];
    updates.init=s.init;updates.name=s.name;
    update(ref(db,'staff/'+editingStaffId),updates);
  } else {
    const name=document.getElementById('s-name').value.trim();if(!name)return;
    const newRef=push(ref(db,'staff'));
    const existingList=Object.values(staff);
    const order=existingList.length===0?0:Math.max(...existingList.map(s=>s.order??0))+1;
    set(newRef,{name,role:document.getElementById('s-role').value,init:name[0],pal:parseInt(document.getElementById('s-color').value),order});
  }
  document.getElementById('modal-staff').classList.remove('open');
};

// ── 予約 ──
function buildTimes(startSlot){
  const si=startSlot?SLOTS.indexOf(startSlot):2;
  document.getElementById('i-start').innerHTML=SLOTS.map((s,i)=>`<option${i===si?' selected':''}>${s}</option>`).join('');
  document.getElementById('i-end').innerHTML=SLOTS.map((s,i)=>`<option${i===Math.min(si+4,SLOTS.length-1)?' selected':''}>${s}</option>`).join('');
}
window.onTypeChange=function(){const t=document.getElementById('i-type').value;document.getElementById('user-detail-section').style.display=(t==='event'||t==='other')?'none':'block';};
window.onGrpChange=function(){document.getElementById('pax-section').style.display=document.querySelector('input[name="grp"]:checked').value==='group'?'block':'none';};
window.openBkModal=function(id){
  editingBkId=id;document.getElementById('bk-mtitle').textContent=id?'予約を編集':'予約を追加';
  if(id){const b=bookings[id];if(!b)return;document.getElementById('i-type').value=b.type||'user';window.onTypeChange();if(b.type==='user'){const gv=b.grp||'individual';document.querySelector(`input[name="grp"][value="${gv}"]`).checked=true;document.getElementById('pax-section').style.display=gv==='group'?'block':'none';document.getElementById('i-pax').value=b.pax||'';}document.getElementById('i-name').value=b.name;document.getElementById('i-space').value=b.space;document.getElementById('i-date').value=b.date;buildTimes(b.start);document.getElementById('i-end').value=b.end;document.getElementById('i-status').value=b.status;}
  else{document.getElementById('i-type').value='user';window.onTypeChange();document.querySelector('input[name="grp"][value="individual"]').checked=true;document.getElementById('pax-section').style.display='none';document.getElementById('i-name').value='';document.getElementById('i-date').value=dateStr(calWeekOff,0);document.getElementById('i-status').value='仮予約';buildTimes();}
  document.getElementById('modal-bk').classList.add('open');
};
window.openBkModalWith=function(date,slot){window.openBkModal(null);document.getElementById('i-date').value=date;buildTimes(slot);};
window.saveBk=function(){
  const name=document.getElementById('i-name').value.trim();if(!name)return;
  const type=document.getElementById('i-type').value;
  const grp=type==='user'?document.querySelector('input[name="grp"]:checked').value:null;
  const pax=grp==='group'?parseInt(document.getElementById('i-pax').value)||null:null;
  const data={type,grp,pax,name,space:document.getElementById('i-space').value,date:document.getElementById('i-date').value,start:document.getElementById('i-start').value,end:document.getElementById('i-end').value,status:document.getElementById('i-status').value};
  if(editingBkId)update(ref(db,'bookings/'+editingBkId),data);
  else push(ref(db,'bookings'),data);
  document.getElementById('modal-bk').classList.remove('open');
  setStatus('保存しました','saved');
};
window.delBk=function(id){if(!confirm('この予約を削除しますか？'))return;remove(ref(db,'bookings/'+id));};

const now=new Date();
document.getElementById('hdr-date').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';
</script>
</body>
